<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>미래 사회와 첨단 과학 탐구 — 관측 스테이션</title>
<link rel="stylesheet" href="../assets/theme.css">
</head>
<body>

<div class="app">
  <nav class="rail" id="rail">
    <div class="brand">
      <a class="home" href="../">← 과학탐구실험2</a>
      <div class="eyebrow" style="margin-top:8px">Ⅱ · 미래 사회와 첨단 과학 탐구</div>
      <h1 class="display">첨단 과학과<br>탐구 설계</h1>
    </div>
    <button class="tab-btn active" data-tab="0"><span class="num">01</span> 첨단 과학 기술</button>
    <button class="tab-btn" data-tab="1"><span class="num">02</span> 센서를 활용한 탐구 설계</button>
  </nav>

  <main>
    <section class="tab-panel" data-panel="0">
      <div class="stage-head">
        <div class="eyebrow">01 · 미래를 여는 과학 기술</div>
        <h2 class="display">첨단 과학 기술 탐구</h2>
        <p>카드를 클릭해 첨단 과학 기술이 어떤 원리로 작동하고 어디에 활용되는지 확인해 보세요.</p>
      </div>
      <div class="stage-card">
        <div class="canvas-wrap"><canvas id="c0" width="900" height="420"></canvas></div>
        <div class="info-card" id="c0-info">카드를 클릭해 보세요.</div>
      </div>
    </section>

    <section class="tab-panel" data-panel="1" hidden>
      <div class="stage-head">
        <div class="eyebrow">02 · 센서로 문제를 해결하는 프로젝트</div>
        <h2 class="display">센서를 활용한 탐구 설계 — 자동 급수 장치</h2>
        <p>토양 수분 센서로 식물에 자동으로 물을 주는 장치를 설계하는 과정을 단계별로 확인해 보세요.</p>
      </div>
      <div class="stage-card">
        <div class="canvas-wrap"><canvas id="c1" width="900" height="380"></canvas></div>
        <div class="info-card" id="c1-info">단계를 클릭해 보세요.</div>
      </div>
    </section>
  </main>
</div>

<button class="theme-toggle" id="themeToggle">라이트 모드</button>
<script src="../assets/theme.js"></script>
<script>
(function () {
"use strict";

/* TAB0 첨단기술 */
(function () {
  var canvas = document.getElementById("c0");
  var ctx = setupCanvas(canvas);
  var W = canvas._w, H = canvas._h;
  var info = document.getElementById("c0-info");
  var cards = [
    { icon: "🤖", name: "인공지능(AI)", desc: "데이터를 학습해 패턴을 찾고 예측·판단하는 기술로, 의료 진단·자율 주행 등에 활용됩니다.", x: 130, y: 100 },
    { icon: "📶", name: "사물 인터넷(IoT)", desc: "센서가 부착된 사물들이 인터넷으로 연결되어 데이터를 주고받으며 자동으로 작동합니다.", x: 380, y: 100 },
    { icon: "🧬", name: "유전자 가위", desc: "특정 DNA 서열을 정밀하게 자르고 교정하는 기술로, 유전 질환 치료 연구에 쓰입니다.", x: 630, y: 100 },
    { icon: "🖨️", name: "3D 프린팅", desc: "설계 데이터를 바탕으로 재료를 층층이 쌓아 입체 물체를 제작하는 기술입니다.", x: 850, y: 100 },
    { icon: "🥽", name: "가상·증강 현실(VR/AR)", desc: "컴퓨터 그래픽으로 가상의 환경을 만들거나 현실에 정보를 겹쳐 보여주는 기술입니다.", x: 250, y: 280 },
    { icon: "🔋", name: "이차 전지", desc: "충전해서 반복 사용할 수 있는 전지로, 전기차와 에너지 저장 시스템의 핵심 기술입니다.", x: 550, y: 280 }
  ];
  canvas.addEventListener("click", function (e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas._w / rect.width, scaleY = canvas._h / rect.height;
    var mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
    cards.forEach(function (c) { if (mx > c.x - 105 && mx < c.x + 105 && my > c.y - 70 && my < c.y + 70) info.innerHTML = "<b>" + c.icon + " " + c.name + "</b> — " + c.desc; });
  });
  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = cssVar("--panel"); ctx.fillRect(0, 0, W, H);
    cards.forEach(function (c) {
      ctx.save();
      ctx.strokeStyle = cssVar("--line"); ctx.fillStyle = cssVar("--panel-2");
      ctx.fillRect(c.x - 105, c.y - 70, 210, 140);
      ctx.strokeRect(c.x - 105, c.y - 70, 210, 140);
      ctx.restore();
      ctx.font = "34px Segoe UI"; ctx.textAlign = "center"; ctx.fillText(c.icon, c.x, c.y - 10);
      ctx.font = "700 12px Segoe UI"; ctx.fillStyle = cssVar("--foam"); ctx.fillText(c.name, c.x, c.y + 28);
    });
  }
  render();
})();

/* TAB1 센서탐구설계 */
(function () {
  var canvas = document.getElementById("c1");
  var ctx = setupCanvas(canvas);
  var W = canvas._w, H = canvas._h;
  var info = document.getElementById("c1-info");
  var steps = [
    { icon: "🌱", name: "토양 수분 센서", desc: "화분 흙에 센서를 꽂아 토양의 수분량을 전기적 신호로 측정합니다." },
    { icon: "🧠", name: "제어 장치(마이크로컨트롤러)", desc: "센서 값을 읽어 미리 설정한 기준값(예: 수분 30% 이하)과 비교합니다." },
    { icon: "⚙️", name: "판단", desc: "기준값보다 건조하면 '물 주기' 신호를, 충분하면 '대기' 신호를 내립니다." },
    { icon: "💧", name: "펌프 작동", desc: "'물 주기' 신호를 받으면 소형 펌프가 작동해 정해진 양만큼 물을 공급합니다." }
  ];
  canvas.addEventListener("click", function (e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas._w / rect.width;
    var mx = (e.clientX - rect.left) * scaleX;
    var cellW = W / steps.length;
    var idx = Math.floor(mx / cellW);
    if (steps[idx]) info.innerHTML = "<b>" + steps[idx].icon + " " + steps[idx].name + "</b> — " + steps[idx].desc;
  });
  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = cssVar("--panel"); ctx.fillRect(0, 0, W, H);
    var cellW = W / steps.length;
    steps.forEach(function (s, i) {
      var x = i * cellW;
      ctx.strokeStyle = cssVar("--line"); ctx.strokeRect(x + 8, 100, cellW - 16, 180);
      ctx.font = "40px Segoe UI"; ctx.textAlign = "center"; ctx.fillText(s.icon, x + cellW / 2, 190);
      ctx.font = "700 12px Segoe UI"; ctx.fillStyle = cssVar("--foam");
      wrapText(ctx, s.name, x + cellW / 2, 230, cellW - 30, 15);
      if (i < steps.length - 1) {
        ctx.save(); ctx.strokeStyle = cssVar("--teal"); ctx.fillStyle = cssVar("--teal"); ctx.lineWidth = 2;
        drawArrow(ctx, x + cellW - 14, 190, x + cellW + 14, 190, 7);
        ctx.restore();
      }
    });
    function wrapText(ctx, text, x, y, maxW, lh) {
      var line = "", lines = [];
      for (var i = 0; i < text.length; i++) {
        var test = line + text[i];
        if (ctx.measureText(test).width > maxW && line.length > 0) { lines.push(line); line = text[i]; } else line = test;
      }
      lines.push(line);
      lines.forEach(function (l, i) { ctx.fillText(l, x, y + i * lh); });
    }
  }
  render();
})();

})();
</script>
</body>
</html>
